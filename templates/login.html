<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
</head>
<body>
    <section class="vh-100 gradient-custom">
        <div class="container py-5 h-100">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                    <div class="card bg-dark text-white" style="border-radius: 1rem;">
                        <div class="card-body p-5 text-center">
                            <div class="mb-md-5 mt-md-4 pb-5">
                                <h2 class="fw-bold mb-2 text-uppercase">Login</h2>
                                <p class="text-white-50 mb-5">Please enter your login and password!</p>
                                {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
{% endif %}
                                <div id="alertPlaceholder"></div>

                                <form id="loginForm" method="POST" action="{{ url_for('login') }}">
                                    <div class="form-outline form-white mb-4">
                                        <input type="text" id="typeUsernameX" name="username" class="form-control form-control-lg text-center" required />
                                        <label class="form-label" for="typeUsernameX">Username</label>
                                    </div>
                                    <div class="form-outline form-white mb-4">
                                        <input type="password" id="typePasswordX" name="password" class="form-control form-control-lg text-center" required />
                                        <label class="form-label" for="typePasswordX">Password</label>
                                    </div>
                                    
                                <button class="btn btn-outline-light btn-lg px-5" type="submit">Login</button>
                                </form>
                                <div class="d-flex justify-content-center text-center mt-4 pt-1">
                                    <a href="#!" class="text-white"><i class="fab fa-facebook-f fa-lg"></i></a>
                                    <a href="#!" class="text-white"><i class="fab fa-twitter fa-lg mx-4 px-2"></i></a>
                                    <a href="#!" class="text-white"><i class="fab fa-google fa-lg"></i></a>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        $(document).ready(function() {
            $('#loginForm').on('submit', function(e) {
                var isValid = true;
                var $username = $('#typeUsernameX');
                var $password = $('#typePasswordX');

                if ($username.val().trim() === '') {
                    isValid = false;
                    $username.addClass('is-invalid');
                } else {
                    $username.removeClass('is-invalid');
                }

                if ($password.val().trim() === '') {
                    isValid = false;
                    $password.addClass('is-invalid');
                } else {
                    $password.removeClass('is-invalid');
                }

                if (!isValid) {
                    e.preventDefault(); // prevent the form from submitting
                    $('#alertPlaceholder').html(`
                        <div class="alert alert-warning alert-dismissible fade show" role="alert">
                            Please fill in all fields.
                            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                    `);
                }
            });
        });
    </script>
</body>
</html>
